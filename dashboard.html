<!DOCTYPE html>
<html lang="pt-AO">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LocalWab Admin - Painel</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<style>
body { margin:0; font-family:Arial; background:#0f172a; color:white;}
header { background:#020617; padding:15px; text-align:center; font-size:22px; font-weight:bold;}
.container { padding:15px;}
.card { background:#1e293b; padding:15px; border-radius:10px; margin-bottom:15px;}
#map { height:400px; width:100%; border-radius:10px; margin-top:10px;}
ul {list-style:none; padding-left:0;}
li {padding:5px 0;}
</style>
</head>
<body>

<header>
🚀 LocalWab Admin
</header>

<div class="container">

  <div class="card">
    <h3>👤 Usuários Comuns</h3>
    <ul id="users"></ul>
  </div>

  <div class="card">
    <h3>🧑‍💼 Membros da Empresa</h3>
    <ul id="members"></ul>
  </div>

  <div class="card">
    <h3>💰 Pagamentos</h3>
    <ul id="payments"></ul>
  </div>

  <div class="card">
    <h3>🚌 Mapa dos Veículos</h3>
    <div id="map"></div>
  </div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
// ================== DADOS SIMULADOS ==================
let users = [
    {nome:"João", numero:"940045782", expira: Date.now()+600000},
    {nome:"Maria", numero:"923000111", expira: Date.now()-1000}
];

let members = [
    {nome:"Carlos", numero:"942111222", funcao:"Fiscal", empresa:"Cidralia", idEmpresa:"CID01"},
    {nome:"Ana", numero:"945333444", funcao:"Cobradora", empresa:"Rosalina", idEmpresa:"ROS02"}
];

let payments = [
    {numero:"940045782", valor:10},
    {numero:"923000111", valor:10}
];

let vehicleMarkers = {};

// ================== RENDER USERS ==================
function renderUsers(){
    let html="";
    users.forEach(u=>{
        let ativo = (u.expira > Date.now()) ? "🟢 Ativo" : "🔴 Expirado";
        html += `<li>${u.nome} - ${u.numero} - ${ativo}</li>`;
    });
    document.getElementById("users").innerHTML = html;
}

// ================== RENDER MEMBERS ==================
function renderMembers(){
    let html="";
    members.forEach(m=>{
        html += `<li>${m.nome} - ${m.funcao} - ${m.empresa} - ${m.idEmpresa}</li>`;
    });
    document.getElementById("members").innerHTML = html;
}

// ================== RENDER PAYMENTS ==================
function renderPayments(){
    let html="";
    payments.forEach(p=>{
        html += `<li>${p.numero} - ${p.valor} KZ</li>`;
    });
    document.getElementById("payments").innerHTML = html;
}

// ================== MAPA ==================
let map = L.map('map').setView([-8.8383, 13.2344], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {maxZoom:19}).addTo(map);

// ================== RASTREAMENTO EM TEMPO REAL ==================
let ws = new WebSocket("ws://localhost:3000/ws"); // URL do servidor WS

ws.onmessage = (msg)=>{
    const data = JSON.parse(msg.data);
    data.vehicles.forEach(v=>{
        if(!vehicleMarkers[v.id]){
            vehicleMarkers[v.id] = L.marker([v.lat,v.lng]).addTo(map)
                .bindPopup(`Veículo ${v.id} - ${v.empresa} - ${v.rota}`);
        } else {
            vehicleMarkers[v.id].setLatLng([v.lat,v.lng]);
        }
    });
};

// ================== INICIAR SISTEMA ==================
function iniciarSistema(){
    renderUsers();
    renderMembers();
    renderPayments();
}

window.onload = iniciarSistema;

// ================== ATUALIZAR USERS/MEMBERS DINAMICAMENTE ==================
setInterval(renderUsers, 1000);
setInterval(renderMembers, 1000);
setInterval(renderPayments, 1000);

</script>
</body>
</html>
