<!DOCTYPE html>
<html lang="pt-AO">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Empresa</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<style>
body{margin:0;font-family:Arial;background:#111827;color:white;}
header{background:#1f2937;padding:15px;text-align:center;}
.container{padding:15px;}
.card{background:#374151;padding:15px;border-radius:10px;margin-bottom:10px;}
#map{height:50vh;border-radius:10px;}
</style>
</head>
<body>
<header>🏢 Dashboard da Empresa</header>
<div class="container">

<div class="card">
<h3>🚐 Meus Veículos</h3>
<p>Total: 10</p>
</div>

<div class="card">
<h3>💰 Receita do Dia</h3>
<p>120.000 Kz</p>
</div>

<div class="card">
<h3>🗺️ Localização</h3>
<div id="map"></div>
</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
const map=L.map('map').setView([-8.8383,13.23],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

const vehicles=[
 {lat:-8.83,lng:13.23},
 {lat:-8.82,lng:13.22}
];

vehicles.forEach(v=>L.marker([v.lat,v.lng]).addTo(map));
</script>
</body>
</html>
