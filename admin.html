<!DOCTYPE html>
<html lang="pt-AO">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Usuário</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<style>
body{margin:0;font-family:Arial;background:#f5f5f5;}
header{background:#cc0000;color:white;padding:15px;text-align:center;}
.container{padding:15px;}
.card{background:white;padding:15px;border-radius:10px;margin-bottom:10px;}
#map{height:50vh;border-radius:10px;}
button{padding:10px;width:100%;background:#28a745;color:white;border:none;border-radius:5px;}
</style>
</head>
<body>
<header>📍 LocalWab</header>
<div class="container">

<div class="card">
<h3>🚐 Transportes próximos</h3>
<div id="map"></div>
</div>

<div class="card">
<h3>⏱️ Tempo estimado</h3>
<p>5 - 10 minutos</p>
</div>

<div class="card">
<button>Solicitar Transporte</button>
</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
const map=L.map('map').setView([-8.8383,13.23],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

L.marker([-8.83,13.23]).addTo(map).bindPopup("Transporte próximo");
</script>
</body>
</html>
