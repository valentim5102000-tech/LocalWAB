<!DOCTYPE html>
<html lang="pt-AO">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LocalWab</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:#f5f5f5;}
header{background:#cc0000;color:#fff;text-align:center;padding:15px;font-size:20px;font-weight:bold;}
#tabs{display:flex;justify-content:center;margin-top:10px;gap:5px;flex-wrap:wrap;}
.tab{padding:10px;background:#ddd;border-radius:5px;cursor:pointer;font-weight:bold;}
.tab.active{background:#cc0000;color:white;}
.content{padding:15px;background:white;margin:10px auto;width:90%;max-width:400px;border-radius:10px;display:none;}
input, select{width:100%;padding:10px;margin:5px 0;border-radius:5px;border:1px solid #ccc;}
button{width:100%;padding:12px;margin-top:8px;border:none;border-radius:5px;font-weight:bold;background:#28a745;color:white;cursor:pointer;}
</style>
</head>
<body>

<header>LocalWab</header>

<div id="tabs">
  <div class="tab active" data-target="login">Login</div>
  <div class="tab" data-target="cadUser">Cadastrar Usuário</div>
  <div class="tab" data-target="cadEmpresa">Cadastrar Empresa</div>
</div>

<div id="login" class="content" style="display:block;">
  <select id="loginType">
    <option value="user">Usuário</option>
    <option value="empresa">Empresa</option>
    <option value="admin">Admin</option>
  </select>
  <input id="loginName" placeholder="Nome">
  <input id="loginPhone" placeholder="Telefone">
  <input id="loginFuncao" placeholder="Função (empresa)" style="display:none;">
  <input id="loginEmpresaId" placeholder="ID Empresa" style="display:none;">
  <input id="adminCode" placeholder="Código Admin" style="display:none;">
  <button id="loginBtn">Entrar</button>
</div>

<div id="cadUser" class="content">
  <input placeholder="Nome">
  <input placeholder="Telefone">
  <button>Cadastrar</button>
</div>

<div id="cadEmpresa" class="content">
  <input placeholder="Nome">
  <input placeholder="Telefone">
  <input placeholder="Empresa">
  <button>Cadastrar</button>
</div>

<script>
// Tabs
const tabs=document.querySelectorAll('.tab');
const contents=document.querySelectorAll('.content');
tabs.forEach(tab=>{
 tab.onclick=()=>{
  tabs.forEach(t=>t.classList.remove('active'));
  tab.classList.add('active');
  contents.forEach(c=>c.style.display=c.id===tab.dataset.target?'block':'none');
 }
});

// Mostrar campos conforme tipo
const loginType=document.getElementById('loginType');
loginType.onchange=()=>{
 document.getElementById('loginFuncao').style.display=loginType.value==='empresa'?'block':'none';
 document.getElementById('loginEmpresaId').style.display=loginType.value==='empresa'?'block':'none';
 document.getElementById('adminCode').style.display=loginType.value==='admin'?'block':'none';
};

// LOGIN + REDIRECIONAMENTO
document.getElementById('loginBtn').onclick=()=>{
 const tipo=loginType.value;
 const nome=document.getElementById('loginName').value;
 const telefone=document.getElementById('loginPhone').value;
 const empresaID=document.getElementById('loginEmpresaId').value;
 const adminCode=document.getElementById('adminCode').value;

 if(!nome || !telefone){ alert('Preencha os campos'); return; }

 if(tipo==='empresa' && !empresaID){ alert('Informe ID da empresa'); return; }
 if(tipo==='admin' && adminCode!=='1234'){ alert('Código admin inválido'); return; }

 // REDIRECIONAMENTO
 if(tipo==='user'){
   window.location.href='usuario.html';
 }
 else if(tipo==='empresa'){
   window.location.href='empresa.html';
 }
 else if(tipo==='admin'){
   window.location.href='admin.html';
 }
};
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-AO">

*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

header{background:#cc0000;color:#fff;text-align:center;padding:15px;font-size:20px;font-weight:bold;}

.content{padding:15px;background:white;margin:10px auto;width:90%;max-width:400px;border-radius:10px;display:none;}

</style>
</head>
<body>

<header>LocalWab</header>
<div id="offline">⚠️ Estás offline</div>

<div id="tabs">
  <div class="tab active" data-target="login">Login</div>
  <div class="tab" data-target="cadUser">Cadastrar Usuário</div>
  <div class="tab" data-target="cadEmpresa">Cadastrar Empresa</div>
  <div class="tab" data-target="agente">Agente</div>
</div>

<div id="login" class="content" style="display:block;">
  <select id="loginType">
    <option value="user">Usuário</option>
    <option value="empresa">Empresa</option>
  </select>
  <input id="loginName" placeholder="Nome">
  <input id="loginPhone" placeholder="Telefone">
  <input id="loginFuncao" placeholder="Função" style="display:none;">
  <input id="loginEmpresaId" placeholder="ID Empresa" style="display:none;">
  <button id="loginBtn">Entrar</button>
  <button id="ussdBtn">Modo USSD</button>
</div>

<div id="cadUser" class="content">
  <input id="cadUserName" placeholder="Nome">
  <input id="cadUserPhone" placeholder="Telefone">
  <input id="cadUserIdade" placeholder="Idade">
  <select id="cadUserSexo">
    <option value="">Sexo</option>
    <option>Masculino</option>
    <option>Feminino</option>
  </select>
  <button>Cadastrar</button>
</div>

<div id="cadEmpresa" class="content">
  <input placeholder="Nome">
  <input placeholder="Telefone">
  <input placeholder="Idade">
  <select>
    <option>Sexo</option>
  </select>
  <input placeholder="Função">
  <input placeholder="Empresa">
  <input placeholder="ID Empresa">
  <button>Cadastrar</button>
</div>

<div id="agente" class="content">
  <input id="agNome" placeholder="Nome Passageiro">
  <input id="agDestino" placeholder="Destino">
  <button onclick="solicitarViaAgente()">Solicitar Transporte</button>
</div>

<div id="map"></div>
<div id="status"></div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script>

// Tabs
const tabs=document.querySelectorAll('.tab');
const contents=document.querySelectorAll('.content');
tabs.forEach(tab=>{
 tab.onclick=()=>{
  tabs.forEach(t=>t.classList.remove('active'));
  tab.classList.add('active');
  contents.forEach(c=>c.style.display=c.id===tab.dataset.target?'block':'none');
 }
});

// Login
const loginType=document.getElementById('loginType');
loginType.onchange=()=>{
 document.getElementById('loginFuncao').style.display=loginType.value==='empresa'?'block':'none';
 document.getElementById('loginEmpresaId').style.display=loginType.value==='empresa'?'block':'none';
};

// USSD Simulação
ussdBtn.onclick=()=>{
 alert("USSD: *123#\n1.Ver rotas\n2.Pedir transporte");
};

// Agente
function solicitarViaAgente(){
 const nome=document.getElementById('agNome').value;
 const destino=document.getElementById('agDestino').value;
 alert("Pedido enviado via agente");
 console.log(nome,destino);
}

// Mapa
const map=L.map('map').setView([-8.8383,13.23],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
let markers={};

setInterval(()=>{
 const vehicles=[
  {id:1,lat:-8.83+Math.random()*0.01,lng:13.23+Math.random()*0.01},
  {id:2,lat:-8.82+Math.random()*0.01,lng:13.22+Math.random()*0.01}
 ];
 vehicles.forEach(v=>{
  if(!markers[v.id]) markers[v.id]=L.marker([v.lat,v.lng]).addTo(map);
  else markers[v.id].setLatLng([v.lat,v.lng]);
 });
},2000);

</script>
</body>
</html>
