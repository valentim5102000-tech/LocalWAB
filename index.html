<!DOCTYPE html>
<html lang="pt-AO">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LocalWab</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#cc0000">
<link rel="apple-touch-icon" href="icon-192.png">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:#f5f5f5;}

header{
  background:#cc0000;
  color:#fff;
  text-align:center;
  padding:15px;
  font-size:20px;
  font-weight:bold;
}

#map{
  height:60vh;
}

#panel{
  padding:10px;
  background:#fff;
}

input{
  width:100%;
  padding:10px;
  margin-bottom:8px;
  border-radius:5px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:12px;
  margin-top:5px;
  border:none;
  border-radius:5px;
  font-weight:bold;
}

#payBtn{background:#28a745;color:#fff;}
#trackBtn{background:#ff9800;color:#fff;display:none;}
#checkBtn{background:#007bff;color:#fff;display:none;}

#status{
  margin-top:10px;
  text-align:center;
  font-weight:bold;
}

#offline{
  background:#ffc107;
  text-align:center;
  padding:5px;
  display:none;
}
</style>
</head>

<body>

<header>LocalWab</header>

<div id="offline">⚠️ Estás offline</div>

<div id="map"></div>

<div id="panel">
<input id="userName" placeholder="Seu nome">
<input id="userPhone" placeholder="Telefone">

<button id="payBtn">Pagar 10 KZ</button>
<button id="checkBtn">Já confirmei pagamento</button>
<button id="trackBtn">Iniciar Rastreamento</button>

<div id="status"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// ================= MAPA =================
const map = L.map('map').setView([-8.83,13.23],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  maxZoom:19
}).addTo(map);

let userMarker=null;

// ================= OFFLINE =================
function updateOnlineStatus(){
  offline.style.display = navigator.onLine ? "none":"block";
}
window.addEventListener('online',updateOnlineStatus);
window.addEventListener('offline',updateOnlineStatus);
updateOnlineStatus();

// ================= SERVICE WORKER =================
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

let currentPaymentId=null;

// ================= PAGAMENTO =================
payBtn.onclick = async ()=>{

  if(!navigator.onLine){
    status.innerText="Liga a internet para pagar.";
    return;
  }

  const name=userName.value;
  const phone=userPhone.value;

  if(!name || !phone){
    alert("Preencha os dados");
    return;
  }

  status.innerText="A enviar pedido de pagamento...";

  try{
    const res=await fetch('/api/pay',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({name,phone,amount:10})
    });

    const data=await res.json();

    if(data.success){
      currentPaymentId=data.paymentId;

      status.innerText="Receberás uma notificação no Multicaixa Express. Confirma o pagamento.";

      checkBtn.style.display="block";

      // WebSocket automático
      connectWS(data.paymentId);
    }

  }catch{
    status.innerText="Erro ao iniciar pagamento.";
  }
};

// ================= WEBSOCKET =================
function connectWS(paymentId){
  const ws=new WebSocket(`ws://localhost:3000/ws?paymentId=${paymentId}`);

  ws.onmessage=(msg)=>{
    const data=JSON.parse(msg.data);

    if(data.status==="paid"){
      liberarAcesso();
      ws.close();
    }
  };
}

// ================= BOTÃO MANUAL =================
checkBtn.onclick = async ()=>{

  if(!currentPaymentId) return;

  status.innerText="A verificar pagamento...";

  try{
    const res=await fetch(`/api/status/${currentPaymentId}`);
    const data=await res.json();

    if(data.status==="paid"){
      liberarAcesso();
    }else{
      status.innerText="Pagamento ainda não confirmado.";
    }

  }catch{
    status.innerText="Erro ao verificar.";
  }
};

// ================= LIBERAR APP =================
function liberarAcesso(){
  status.innerText="Pagamento confirmado!";
  trackBtn.style.display="block";
  payBtn.style.display="none";
  checkBtn.style.display="none";
}

// ================= GPS =================
trackBtn.onclick=()=>{
  navigator.geolocation.watchPosition(pos=>{
    const lat=pos.coords.latitude;
    const lng=pos.coords.longitude;

    if(!userMarker){
      userMarker=L.marker([lat,lng]).addTo(map)
        .bindPopup("Você");
    }else{
      userMarker.setLatLng([lat,lng]);
    }

    map.setView([lat,lng],16);

  },()=>alert("Erro GPS"),{
    enableHighAccuracy:true
  });
};
</script>

</body>
</html>
