<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LocalWAB</title>

<style>
body{
    font-family: Arial;
    background:#f2f2f2;
    text-align:center;
    margin:0;
    padding:0;
}

header{
    background:#2196f3;
    color:white;
    padding:20px;
    font-size:24px;
}

button{
    background:#2196f3;
    color:white;
    border:none;
    padding:15px;
    margin:10px;
    font-size:16px;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#1976d2;
}

.menu{
    margin-top:20px;
}

#map{
    width:100%;
    height:500px;
    margin-top:10px;
}
</style>

</head>
<body>

<header>LocalWAB</header>

<div class="menu">
<button onclick="localizar()">Ver minha localização</button>
</div>

<div id="map"></div>

<script>
// --- Variáveis globais ---
var map;
var marcadorUsuario;
var marker1, marker2;
var saldoUsuario = 100;
var precoOperacao = 10;

// posições iniciais dos transportes
var transporte1 = {lat:-8.8385, lng:13.2345};
var transporte2 = {lat:-8.8395, lng:13.2360};

// --- Função para iniciar mapa ---
function iniciarMapa(){
    map = new google.maps.Map(document.getElementById("map"), {
        center: {lat:-8.8383, lng:13.2344},
        zoom:15
    });

    // Marcadores dos transportes
    marker1 = new google.maps.Marker({
        position: transporte1,
        map: map,
        title:"Transporte 1"
    });
    marker2 = new google.maps.Marker({
        position: transporte2,
        map: map,
        title:"Transporte 2"
    });

    // Começa a mover os transportes
    moverTransportes();
}

// --- Função para mover transportes aleatoriamente ---
function moverTransportes(){
    setInterval(function(){
        transporte1.lat += (Math.random()-0.5)/1000;
        transporte1.lng += (Math.random()-0.5)/1000;
        marker1.setPosition(transporte1);

        transporte2.lat += (Math.random()-0.5)/1000;
        transporte2.lng += (Math.random()-0.5)/1000;
        marker2.setPosition(transporte2);
    }, 5000);
}

// --- Função para localizar usuário e calcular transporte mais próximo ---
function localizar(){
    if(navigator.geolocation){
        navigator.geolocation.getCurrentPosition(function(position){
            var lat = position.coords.latitude;
            var lon = position.coords.longitude;

            // marcador do usuário
            if(marcadorUsuario){
                marcadorUsuario.setMap(null);
            }
            marcadorUsuario = new google.maps.Marker({
                position: {lat:lat, lng:lon},
                map: map,
                title:"Você está aqui"
            });

            map.setCenter({lat:lat, lng:lon});

            // --- Verifica saldo ---
            if(saldoUsuario < precoOperacao){
                alert("Saldo insuficiente! Adicione fundos para usar o serviço.");
                return;
            }
            saldoUsuario -= precoOperacao;

            // --- Cálculo transporte mais próximo ---
            var d1 = calcularDistancia(lat, lon, transporte1.lat, transporte1.lng);
            var d2 = calcularDistancia(lat, lon, transporte2.lat, transporte2.lng);
            var maisProximo = (d1 < d2) ? "Transporte 1" : "Transporte 2";
            var tempoMinutos = Math.round(Math.min(d1,d2)/30*60); // 30 km/h média

            alert("Operação realizada! 10 Kz deduzidos.\nSaldo restante: "+saldoUsuario+" Kz\nTransporte mais próximo: "+maisProximo+"\nTempo estimado: "+tempoMinutos+" min");

        }, function(error){
            // --- Tratamento de erros detalhado ---
            switch(error.code){
                case error.PERMISSION_DENIED:
                    alert("Erro: Permissão de GPS negada. Ative a localização nas configurações do app.");
                    break;
                case error.POSITION_UNAVAILABLE:
                    alert("Erro: Localização indisponível. Verifique se o GPS está ativo.");
                    break;
                case error.TIMEOUT:
                    alert("Erro: Tempo de busca esgotado. Tente novamente em um local aberto.");
                    break;
                case error.UNKNOWN_ERROR:
                    alert("Erro desconhecido ao obter localização.");
                    break;
            }
        }, {timeout:10000}); // tempo máximo de 10 segundos
    } else {
        alert("GPS não disponível neste dispositivo.");
    }
}

// --- Função para calcular distância ---
function calcularDistancia(lat1, lon1, lat2, lon2){
    var R = 6371; // km
    var dLat = (lat2-lat1)*Math.PI/180;
    var dLon = (lon2-lon1)*Math.PI/180;
    var a = Math.sin(dLat/2)*Math.sin(dLat/2) +
            Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180) *
            Math.sin(dLon/2)*Math.sin(dLon/2);
    var c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    return R * c;
}
</script>

<!-- --- GOOGLE MAPS API --- -->
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyChpU8bvzDz6aTuq6TSOFOAbhNxafUu5ao&callback=iniciarMapa" async defer></script>

</body>
</html>
