<!DOCTYPE html>
<html lang="pt-AO">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LocalWab SPA FINAL</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

header{
background:#020617;
padding:15px;
text-align:center;
font-weight:bold;
}

.container{padding:15px;}

.card{
background:#1e293b;
padding:15px;
border-radius:12px;
margin-top:10px;
}

input,select,button{
width:100%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:none;
}

button{
background:#22c55e;
color:white;
font-weight:bold;
cursor:pointer;
}

.hidden{display:none;}
</style>
</head>

<body>

<header>📍LOCALIZA OS TANSPORTES PUBLICOS MAIS PROXIMO DE TI</header>

<div class="container">

<!-- LOGIN -->
<div id="loginPage" class="card">

<h3>Login / Registo</h3>

<select id="tipo">
<option value="user">Usuário</option>
<option value="empresa">Empresa</option>
<option value="driver">Motorista</option>
<option value="admin">Admin</option>
</select>

<input id="email" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">

<button onclick="register()">Criar Conta</button>
<button onclick="login()">Entrar</button>

</div>

<!-- USER -->
<div id="userPage" class="card hidden">
<h3>🟢 USER</h3>
<p id="userInfo"></p>
<button onclick="go('user.html')">Abrir Painel</button>
<button onclick="logout()">Sair</button>
</div>

<!-- DRIVER -->
<div id="driverPage" class="card hidden">
<h3>🚖 MOTORISTA</h3>
<p id="driverInfo"></p>
<button onclick="go('driver.html')">Abrir Painel</button>
<button onclick="logout()">Sair</button>
</div>

<!-- EMPRESA -->
<div id="empresaPage" class="card hidden">
<h3>🏢 EMPRESA</h3>
<p id="empresaInfo"></p>
<button onclick="go('empresa.html')">Abrir Painel</button>
<button onclick="logout()">Sair</button>
</div>

<!-- ADMIN -->
<div id="adminPage" class="card hidden">
<h3>🛡️ ADMIN MASTER</h3>
<p id="adminInfo"></p>
<button onclick="go('admin.html')">Abrir Painel</button>
<button onclick="logout()">Sair</button>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
apiKey:"AIzaSyDG44wGTJtdINCaVFCFxRJsninm-KwRTDI",
authDomain:"localwabapp.firebaseapp.com",
projectId:"localwabapp",
storageBucket:"localwabapp.firebasestorage.app",
messagingSenderId:"61456899292",
appId:"1:61456899292:web:3f4dc071bcf74471ed2819"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

/* ================= REGISTER ================= */

async function register(){

const email = document.getElementById("email").value;
const senha = document.getElementById("senha").value;
const tipo = document.getElementById("tipo").value;

if(!email || !senha){
alert("Preenche tudo");
return;
}

try{

const res = await auth.createUserWithEmailAndPassword(email, senha);

await db.collection("usuarios").doc(res.user.uid).set({
email,
tipo
});

alert("Conta criada!");

}catch(e){
alert(e.message);
}

}

/* ================= LOGIN ================= */

async function login(){

const email = document.getElementById("email").value;
const senha = document.getElementById("senha").value;

try{

const res = await auth.signInWithEmailAndPassword(email, senha);

const doc = await db.collection("usuarios").doc(res.user.uid).get();

const tipo = doc.data().tipo;
const emailUser = doc.data().email;

showDashboard(tipo,emailUser);

}catch(e){
alert(e.message);
}

}

/* ================= DASHBOARD ROUTER ================= */

function showDashboard(tipo,email){

document.getElementById("loginPage").classList.add("hidden");

if(tipo==="user"){
document.getElementById("userPage").classList.remove("hidden");
document.getElementById("userInfo").innerText=email;
}

if(tipo==="driver"){
document.getElementById("driverPage").classList.remove("hidden");
document.getElementById("driverInfo").innerText=email;
}

if(tipo==="empresa"){
document.getElementById("empresaPage").classList.remove("hidden");
document.getElementById("empresaInfo").innerText=email;
}

if(tipo==="admin"){
document.getElementById("adminPage").classList.remove("hidden");
document.getElementById("adminInfo").innerText=email;
}

}

/* ================= NAV ================= */

function go(page){
window.location.href = page;
}

/* ================= LOGOUT ================= */

function logout(){
location.reload();
}

</script>

</body>
</html>
